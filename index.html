<!DOCTYPE html>
<html lang="es">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FiberTracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-top:env(safe-area-inset-top);transition:background .25s,color .25s}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.hdr{color:#fff;padding:20px 20px 28px;border-radius:0 0 28px 28px}
.card{border-radius:18px;padding:20px;margin:0 16px 12px;border:1px solid}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.btn{background:linear-gradient(135deg,#16a34a,#0f7634);color:#fff;border:none;border-radius:14px;padding:18px 24px;font-weight:700;font-size:17px;cursor:pointer;width:100%;font-family:inherit;display:block;text-align:center}
.btn-est{background:linear-gradient(135deg,#6366f1,#4f46e5)!important}
.btn-del{background:transparent!important;color:#ef4444;border:2px solid #fca5a5!important;font-size:15px;padding:15px 24px}
.btn-outline{background:transparent!important;border:2px solid!important;font-size:15px;padding:13px 24px;font-weight:700;cursor:pointer;border-radius:14px;width:100%;font-family:inherit;text-align:center;display:block}
.inp{width:100%;border:2px solid;border-radius:12px;padding:11px 12px;font-size:17px;font-family:inherit;font-weight:700;text-align:center;outline:none;box-sizing:border-box;background:transparent;transition:border-color .2s}
.inp:focus{border-color:#16a34a!important}
.inp-sm{padding:7px 10px!important;font-size:14px!important;border-radius:10px!important}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-c{border-radius:28px 28px 0 0;padding:24px 20px 60px;width:100%;max-width:480px;max-height:90vh;max-height:90dvh;overflow-y:auto}
.modal-h{width:40px;height:4px;border-radius:2px;background:#d1d5db;margin:0 auto 16px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.2);white-space:nowrap;pointer-events:none}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;border-top:1px solid;display:flex;justify-content:space-around;padding:8px 0 14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));z-index:100}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;font-size:9px;cursor:pointer;padding:4px 6px;font-family:inherit;letter-spacing:.3px}
.nav button.on{color:#16a34a;font-weight:700}
.fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#0f7634);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.4);z-index:150;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;font-weight:800;border-radius:50px;font-size:11px;padding:2px 7px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.three>div{border-radius:12px;padding:7px 4px;text-align:center}
.three .lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;color:#6b7280}
.three .val{font-size:15px;font-weight:800}
.bar-bg{height:5px;border-radius:3px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:3px;transition:width .6s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tog{display:flex;border-radius:12px;padding:3px;margin-bottom:16px}
.tog button{flex:1;padding:10px 0;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:#6b7280}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-on{background:#16a34a;box-shadow:0 0 4px #16a34a}
.sync-off{background:#ef4444}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{font-size:9px;font-weight:800;text-align:center;padding:5px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-day{border-radius:9px;padding:6px 2px;cursor:pointer;text-align:center;font-family:inherit;border:2px solid;transition:all .15s;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cal-empty{min-height:46px}
.sw-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-slider{position:absolute;inset:0;border-radius:24px;background:#d1d5db;cursor:pointer;transition:.25s}
.sw-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw input:checked+.sw-slider{background:#16a34a}
.sw input:checked+.sw-slider:before{transform:translateX(20px)}
.sep{height:1px;margin:8px 0}
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════
// ICONS
// ════════════════════════════════════════════════════════════
const ICO={
ctoInterior:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>',
ctoIntDemanda:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>',
ctoFachada:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="7" y1="6" x2="7" y2="20"/><line x1="12" y1="6" x2="12" y2="20"/><line x1="17" y1="6" x2="17" y2="20"/></svg>',
ctoArqueta:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="1"/><line x1="3" y1="14" x2="21" y2="14"/><line x1="8" y1="4" x2="8" y2="8"/><line x1="16" y1="4" x2="16" y2="8"/><line x1="8" y1="4" x2="16" y2="4"/></svg>',
ctoPoste:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="5" y1="6" x2="19" y2="6"/><line x1="5" y1="6" x2="3" y2="10"/><line x1="19" y1="6" x2="21" y2="10"/></svg>',
ctoAzotea:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><line x1="9" y1="21" x2="9" y2="15"/><line x1="15" y1="21" x2="15" y2="15"/><line x1="9" y1="15" x2="15" y2="15"/></svg>',
ctoPatio:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h18"/><circle cx="8" cy="7.5" r="1.5"/><circle cx="16" cy="7.5" r="1.5"/></svg>',
cdps:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
empalmes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/><rect x="8" y="8" width="8" height="8" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/></svg>',
fusiones:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
potencia:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>',
settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
};

// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
const IND=[
  {key:"ctoInterior",label:"CTO Interior"},
  {key:"ctoIntDemanda",label:"CTO Int. Demanda"},
  {key:"ctoFachada",label:"CTO Fachada"},
  {key:"ctoArqueta",label:"CTO Arqueta"},
  {key:"ctoPoste",label:"CTO Poste"},
  {key:"ctoAzotea",label:"CTO Azotea"},
  {key:"ctoPatio",label:"CTO Patio"},
  {key:"cdps",label:"CDPs"},
  {key:"empalmes",label:"Empalmes"},
  {key:"fusiones",label:"Fusiones"},
  {key:"potencia",label:"Potencia (CTO)"},
];
const DEFAULT_TARGETS={
  ctoInterior:2,ctoIntDemanda:3,ctoFachada:4.5,ctoArqueta:3,
  ctoPoste:5,ctoAzotea:5,ctoPatio:5,cdps:7.5,empalmes:4,
  fusiones:90,potencia:30
};
const TIERS=[
  {min:0,  max:60,       bonus:"0 €",      desc:"Sin variable",    color:"#ef4444"},
  {min:60, max:100,      bonus:"% variable",desc:"Proporcional",    color:"#eab308"},
  {min:100,max:110,      bonus:"% variable",desc:"Objetivo cumplido",color:"#22c55e"},
  {min:110,max:120,      bonus:"100 €",    desc:"Sobreproducción",  color:"#16a34a"},
  {min:120,max:130,      bonus:"200 €",    desc:"Sobreproducción",  color:"#059669"},
  {min:130,max:140,      bonus:"300 €",    desc:"Sobreproducción",  color:"#047857"},
  {min:140,max:Infinity, bonus:"400 €",    desc:"Máxima producción",color:"#065f46"},
];
const MN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DOW_LBL=["L","M","X","J","V","S","D"];

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
const mk=(y,m)=>`${y}-${String(m+1).padStart(2,"0")}`;
const ev=()=>IND.reduce((a,i)=>({...a,[i.key]:0}),{});

// ════════════════════════════════════════════════════════════
// PERSISTENCE
// ════════════════════════════════════════════════════════════
const SK="fibertracker-pwa";
const SK_SET="fibertracker-settings";
const ldLocal=()=>{try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}};
const svLocal=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
function ldSet(){
  try{
    const s=JSON.parse(localStorage.getItem(SK_SET))||{};
    return{darkMode:!!s.darkMode,targets:{...DEFAULT_TARGETS,...(s.targets||{})},workingDays:{...(s.workingDays||{})}};
  }catch{return{darkMode:false,targets:{...DEFAULT_TARGETS},workingDays:{}};}
}
const svSet=s=>{try{localStorage.setItem(SK_SET,JSON.stringify(s))}catch{}};

// ════════════════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════════════════
const LIGHT={bg:"#f8fdf9",card:"#fff",border:"#e5e7eb",text:"#111827",muted:"#9ca3af",dim:"#6b7280",rowBorder:"#f3f4f6",inpBorder:"#e5e7eb",track:"#ecfdf5",nav:"#fff",toggle:"#f3f4f6",hdr:"linear-gradient(135deg,#16a34a 0%,#0f7634 100%)",wknd:"#fffbeb",wkndBorder:"#fde68a"};
const DARK={bg:"#0f172a",card:"#1e293b",border:"#334155",text:"#f1f5f9",muted:"#64748b",dim:"#94a3b8",rowBorder:"#1e293b",inpBorder:"#475569",track:"#052e16",nav:"#1e293b",toggle:"#334155",hdr:"linear-gradient(135deg,#15803d 0%,#064e3b 100%)",wknd:"#1e1b4b",wkndBorder:"#3730a3"};
const C=()=>state.settings.darkMode?DARK:LIGHT;

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let state={
  data:ldLocal(),
  settings:ldSet(),
  view:"dashboard",
  curMonth:mk(new Date().getFullYear(),new Date().getMonth()),
  editDay:null,
  form:ev(),
  formCrew:2,
  formEst:false,
  detailDay:null,
  picker:false,
  baremo:false,
  settingsOpen:false,
  toast:null,
};

// ════════════════════════════════════════════════════════════
// GETTERS & CALCULATIONS
// ════════════════════════════════════════════════════════════
const getD=key=>Number(state.settings.targets[key])||DEFAULT_TARGETS[key];
const getWD=()=>state.settings.workingDays[state.curMonth]||23;
const getWDFor=mkey=>state.settings.workingDays[mkey]||23;
const ceq=d=>{let s=0;IND.forEach(i=>{s+=((d[i.key]||0)/getD(i.key))*100});return s};
const cind=d=>ceq(d)/(d._crew||2);
const gt=p=>TIERS.find(t=>p>=t.min&&p<t.max)||TIERS[TIERS.length-1];
const nextT=p=>TIERS.find(t=>t.min>p)||null;

function getEntries(){
  const m=state.data[state.curMonth]||{};
  return Object.entries(m).map(([d,v])=>({day:Number(d),...v})).sort((a,b)=>a.day-b.day);
}
function getEntriesFor(mkey){
  const m=state.data[mkey]||{};
  return Object.entries(m).map(([d,v])=>({day:Number(d),...v})).sort((a,b)=>a.day-b.day);
}
function acumAt(entries,dn){
  const up=entries.filter(e=>e.day<=dn);
  if(!up.length)return 0;
  return up.reduce((s,e)=>s+cind(e),0)/up.length;
}
function gAcum(entries){if(!entries.length)return 0;return entries.reduce((s,e)=>s+cind(e),0)/entries.length}
function gAvgEq(entries){if(!entries.length)return 0;return entries.reduce((s,e)=>s+ceq(e),0)/entries.length}
function bestDay(entries){if(!entries.length)return null;return entries.reduce((b,e)=>{const p=cind(e);return p>b.pct?{day:e.day,pct:p}:b},{day:0,pct:-1})}
function getE(d){return(state.data[state.curMonth]||{})[String(d)]||null}
function daysInMonth(mkey){const[y,m]=mkey.split('-').map(Number);return new Date(y,m,0).getDate()}
// Day of week Mon=0 ... Sun=6
function dowOf(day,mkey){const[y,m]=(mkey||state.curMonth).split('-').map(Number);return(new Date(y,m-1,day).getDay()+6)%7}

// ════════════════════════════════════════════════════════════
// STATE MUTATIONS
// ════════════════════════════════════════════════════════════
function ss(patch){Object.assign(state,patch);render()}
function flash(m){ss({toast:m});setTimeout(()=>ss({toast:null}),2200)}
function shiftM(dir){const[y,m]=state.curMonth.split('-').map(Number);const d=new Date(y,m-1+dir,1);ss({curMonth:mk(d.getFullYear(),d.getMonth()),detailDay:null})}
function openEd(n){
  const ex=getE(n);
  if(ex){const{_est,_crew,...vals}=ex;ss({editDay:n,form:{...ev(),...vals},formCrew:_crew||2,formEst:!!_est,picker:false})}
  else ss({editDay:n,form:ev(),formCrew:2,formEst:false,picker:false});
}
function saveDay(){
  const nd=JSON.parse(JSON.stringify(state.data));
  if(!nd[state.curMonth])nd[state.curMonth]={};
  nd[state.curMonth][String(state.editDay)]={...state.form,_est:state.formEst,_crew:state.formCrew};
  svLocal(nd);fbSave(nd);ss({data:nd,editDay:null});flash("Día registrado ✓");
}
function delDay(n){
  const nd=JSON.parse(JSON.stringify(state.data));
  if(nd[state.curMonth]){delete nd[state.curMonth][String(n)];if(!Object.keys(nd[state.curMonth]).length)delete nd[state.curMonth]}
  svLocal(nd);fbSave(nd);ss({data:nd,editDay:null});flash("Eliminado");
}
function updF(key,val){
  const n=val===""?0:parseFloat(val);
  if(isNaN(n)||n<0)return;
  state.form[key]=n;
  // Update only the % label and input border for this indicator — no full re-render
  const pct=((n/state.formCrew)/getD(key))*100;
  const t=gt(pct);
  const lbl=document.getElementById("pct-lbl-"+key);
  if(lbl){lbl.textContent=pct.toFixed(0)+"%";lbl.style.color=n>0?t.color:C().border;}
  const inp=document.getElementById("inp-"+key);
  if(inp)inp.style.borderColor=n>0?t.color+"88":C().inpBorder;
  // Update preview threePct without touching the inputs
  const prev=document.getElementById("editor-preview");
  if(prev){
    const fwc={...state.form,_crew:state.formCrew};
    const entries=getEntries();
    const others=entries.filter(e=>e.day!==state.editDay);
    const allI=[...others.map(e=>cind(e)),cind(fwc)];
    const prevA=allI.length>0?allI.reduce((a,b)=>a+b,0)/allI.length:0;
    prev.innerHTML="";
    prev.append(threePct(ceq(fwc),cind(fwc),prevA));
  }
}
function updSet(patch){state.settings={...state.settings,...patch};svSet(state.settings);render()}
function updTarget(key,val){const n=parseFloat(val);if(!isNaN(n)&&n>0){state.settings.targets={...state.settings.targets,[key]:n};svSet(state.settings);render()}}
function updWD(val){const n=parseInt(val);if(!isNaN(n)&&n>=1&&n<=31){state.settings.workingDays={...state.settings.workingDays,[state.curMonth]:n};svSet(state.settings);render()}}

async function exportMonth(entries,acum,avgEq,tier){
  const[yr,mo]=state.curMonth.split('-').map(Number);
  const wd=getWD();
  const sep='═'.repeat(36);
  const sep2='─'.repeat(36);
  let lines=[
    `FIBERTRACKER · ${MN[mo-1]} ${yr}`,sep,
    `Días registrados:   ${entries.length} / ${wd}`,
    `% Acumulado indiv.: ${acum.toFixed(1)}%`,
    `% Equipo medio:     ${avgEq.toFixed(1)}%`,
    `Tier actual:        ${tier.desc}`,
    `Bonus estimado:     ${tier.bonus}`,
    '',
    'DESGLOSE POR INDICADOR (media/día individ.):',sep2,
  ];
  IND.forEach(i=>{
    let sumInd=0;
    entries.forEach(e=>{sumInd+=(e[i.key]||0)/(e._crew||2)});
    const avgI=entries.length?sumInd/entries.length:0;
    const pct=(avgI/getD(i.key))*100;
    lines.push(`${i.label.padEnd(20)} ${avgI.toFixed(1).padStart(5)}/día   ${pct.toFixed(0)}%`);
  });
  lines.push('',`Generado con FiberTracker · ${new Date().toLocaleDateString('es-ES')}`);
  try{await navigator.clipboard.writeText(lines.join('\n'));flash('Copiado al portapapeles ✓')}
  catch{flash('Error al copiar')}
}

const h=(tag,attrs,...ch)=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="html")el.innerHTML=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});
  return el;
};
function ico(key,sz=16){return h("span",{html:ICO[key],style:{display:"inline-flex",width:sz+"px",height:sz+"px",color:C().dim}})}
function icoW(key,sz=16,color){return h("span",{html:ICO[key],style:{display:"inline-flex",width:sz+"px",height:sz+"px",color:color||C().dim}})}

function ringSVG(value,size=164){
  const st=11,r=(size-st)/2,ci=2*Math.PI*r,off=ci-(Math.min(value,200)/200)*ci,t=gt(value);
  return`<svg width="${size}" height="${size}" style="display:block;margin:0 auto">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${C().track}" stroke-width="${st}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${t.color}" stroke-width="${st}" stroke-dasharray="${ci}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .7s ease"/>
    <text x="50%" y="44%" text-anchor="middle" style="font-size:${size*.22}px;font-weight:800;fill:${C().text};font-family:inherit">${value.toFixed(1)}%</text>
    <text x="50%" y="60%" text-anchor="middle" style="font-size:${size*.07}px;fill:${C().muted};font-weight:600;text-transform:uppercase;letter-spacing:1px;font-family:inherit">% Acumulado</text>
    <text x="50%" y="72%" text-anchor="middle" style="font-size:${size*.068}px;fill:${t.color};font-weight:700;font-family:inherit">${t.desc}</text>
  </svg>`;
}

function badge(val){const t=gt(val);return h("span",{class:"badge",style:{background:t.color+"20",color:t.color}},val.toFixed(1)+"%")}

function threePct(eq,ind,ac){

  return d;
}

function lineChartSVG(entries){
  if(entries.length<2)return null;
  const wd=getWD(),W=320,H=110,px=6,py=18;
  const pcts=entries.map((_,i)=>{const up=entries.slice(0,i+1);return up.reduce((s,e)=>s+cind(e),0)/up.length});
  const maxP=Math.max(150,...pcts,110);
  const xs=d=>px+((d-1)/Math.max(wd-1,1))*(W-2*px);
  const ys=p=>H-py-(p/maxP)*(H-2*py);
  const y100=ys(100);
  const t=gt(pcts[pcts.length-1]);
  const pts=entries.map((e,i)=>`${xs(e.day).toFixed(1)},${ys(pcts[i]).toFixed(1)}`);
  const pathD='M'+pts.join(' L');
  const lx=xs(entries[entries.length-1].day),ly=ys(pcts[pcts.length-1]);
  const showProj=entries[entries.length-1].day<wd;
  const dots=entries.map((e,i)=>`<circle cx="${xs(e.day).toFixed(1)}" cy="${ys(pcts[i]).toFixed(1)}" r="${i===entries.length-1?4:2.5}" fill="${t.color}" stroke="${C().card}" stroke-width="1.5"/>`).join('');
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <line x1="${px}" y1="${y100.toFixed(1)}" x2="${W-px}" y2="${y100.toFixed(1)}" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="${W-px+2}" y="${y100.toFixed(1)}" fill="#16a34a" font-size="8" opacity="0.7" dominant-baseline="middle">100%</text>
    <path d="${pathD}" fill="none" stroke="${t.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${showProj?`<line x1="${lx.toFixed(1)}" y1="${ly.toFixed(1)}" x2="${xs(wd).toFixed(1)}" y2="${ly.toFixed(1)}" stroke="${t.color}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>`:``}
    ${dots}
    <text x="${lx.toFixed(1)}" y="${(ly-9).toFixed(1)}" text-anchor="middle" fill="${t.color}" font-size="9" font-weight="700" font-family="inherit">${pcts[pcts.length-1].toFixed(1)}%</text>
  </svg>`;
}

function projCard(entries,acum){
  const wd=getWD(),remaining=wd-entries.length;
  if(!entries.length||remaining<=0)return null;
  const sumInd=entries.reduce((s,e)=>s+cind(e),0);
  const nt=nextT(acum);
  const curT=gt(acum);
  const c=h("div",{class:"card",style:{background:C().card,borderColor:C().border,marginTop:0}});
  c.append(h("div",{class:"ct",style:{color:C().muted}},"Proyección · "+remaining+" días restantes"));
  // Current pace
  c.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",padding:"10px 12px",borderRadius:"12px",background:curT.color+"12",border:`1px solid ${curT.color}30`}},
    h("span",{style:{fontSize:"13px",fontWeight:600,color:C().text}},"Al ritmo actual terminarás en"),
    h("span",{style:{fontSize:"16px",fontWeight:800,color:curT.color}},acum.toFixed(1)+"%")
  ));
  if(nt){
    const needed=(nt.min*wd-sumInd)/remaining;
    const feasible=needed<=200;
    c.append(h("div",{style:{padding:"10px 12px",borderRadius:"12px",background:feasible?nt.color+"10":"#ef444410",border:`1px solid ${feasible?nt.color+"30":"#ef444430"}`}},
      h("div",{style:{fontSize:"11px",fontWeight:700,color:C().muted,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"4px"}},"Para "+nt.desc+" ("+nt.bonus+")"),
      feasible
        ?h("div",{style:{fontSize:"13px",fontWeight:600,color:C().text}},
            "Necesitas ",h("strong",{style:{color:nt.color}},needed.toFixed(1)+"% individual"),
            " de media los próximos "+remaining+" días")
        :h("div",{style:{fontSize:"13px",fontWeight:600,color:"#ef4444"}},"Ya no es alcanzable este mes")
    ));
  }
  return c;
}

    const hc=h("div",{class:"card",style:{background:C().card,borderColor:C().border}});
    hc.append(h("div",{class:"ct",style:{color:C().muted}},"Histórico diario"));
    [...entries].reverse().forEach(e=>hc.append(dayRow(e,entries,()=>ss({detailDay:e}))));
    w.append(hc);
  }
  f.append(w);return f;
}

function renderHist(){

  f.append(h("div",{class:"hdr",style:{background:C().hdr,paddingBottom:"22px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},

      syncDot()
    ),
    h("div",{style:{fontSize:"22px",fontWeight:800,marginTop:"8px"}},"Todos los meses")
  ));
  const w=h("div",{style:{padding:"8px 16px",paddingBottom:"100px"}});

  const months=Object.keys(state.data).sort().reverse();
  if(!months.length){
    const nc=h("div",{class:"card",style:{background:C().card,borderColor:C().border,textAlign:"center",padding:"32px 20px"}});

    w.append(nc);

    sc.append(h("div",{class:"ct",style:{color:C().muted}},"Resumen global"));
    sc.append(h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}},
      h("div",{style:{textAlign:"center",padding:"12px",borderRadius:"12px",background:C().track}},
        h("div",{style:{fontSize:"28px",fontWeight:800,color:"#16a34a"}},String(monthsCount)),

          isCur?h("span",{style:{fontSize:"9px",fontWeight:700,color:t.color,background:t.color+"15",padding:"2px 8px",borderRadius:"4px"}},"MES ACTUAL"):null
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:"22px",fontWeight:800,color:t.color}},ac.toFixed(1)+"%"),
          h("div",{style:{fontSize:"11px",color:C().muted}},"acumulado")

      mc.append(h("div",{style:{marginTop:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",{style:{display:"flex",gap:"8px"}},

function renderDetail(entries){
  const e=state.detailDay;

  const eq=ceq(e),ind=cind(e),ac=acumAt(entries,e.day),cr=e._crew||2;
  const totalT=IND.reduce((s,i)=>s+(e[i.key]||0),0);
  const dow=dowOf(e.day);
  const f=document.createDocumentFragment();
  f.append(h("div",{class:"hdr",style:{background:C().hdr}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",null,
        h("div",{style:{fontSize:"12px",fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",opacity:.8,marginBottom:"2px"}},"Resumen del Día"),
        h("div",{style:{fontSize:"22px",fontWeight:800}},`${DOW_LBL[dow]}. Día ${e.day} · ${MN[mo-1]} ${yr}`)
      ),
      h("button",{style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"14px",padding:"8px 14px",cursor:"pointer",fontWeight:700,fontFamily:"inherit"},onClick:()=>ss({detailDay:null})},"✕ Cerrar")
    )
  ));
  const w=h("div",{style:{marginTop:"-16px",paddingBottom:"100px"}});

    h("div",{class:"ct",style:{marginBottom:0,color:C().muted}},"Porcentajes"),

    )
  ));
  sc.append(threePct(eq,ind,ac));
  sc.append(h("div",{style:{marginTop:"12px",textAlign:"center",padding:"8px 16px",borderRadius:"50px",fontSize:"13px",fontWeight:700,background:gt(ind).color+"12",color:gt(ind).color}},gt(ind).desc+" · ÷"+cr));

  ic.append(h("div",{class:"ct",style:{color:C().muted}},"Desglose por indicador"));
  IND.forEach(i=>{
    const team=e[i.key]||0,indiv=team/cr,pct=(indiv/getD(i.key))*100,t=gt(pct);
    ic.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C().rowBorder}`}},
      h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},ico(i.key),h("span",{style:{fontSize:"13px",fontWeight:600,color:C().text}},i.label)),
      h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:"12px",color:C().muted}},team+" eq → "+indiv+" ind."),
          h("div",{style:{fontSize:"11px",color:C().dim}},"Obj: "+getD(i.key)+"/día")
        ),

function renderPicker(){
  const bg=h("div",{class:"modal-bg",onClick:()=>ss({picker:false})});
  const mc=h("div",{class:"modal-c",style:{background:C().card},onClick:e=>e.stopPropagation()});
  mc.append(h("div",{class:"modal-h"}));
  mc.append(h("div",{style:{fontSize:"18px",fontWeight:800,marginBottom:"4px",color:C().text}},"Selecciona el día"));
  const[yr,mo]=state.curMonth.split('-').map(Number);
  mc.append(h("div",{style:{fontSize:"12px",color:C().muted,marginBottom:"16px"}},`${MN[mo-1]} ${yr} · ${getWD()} días laborables`));
  const dim=daysInMonth(state.curMonth),firstDow=dowOf(1),wd=getWD();
  const grid=h("div",{class:"cal-grid"});
  DOW_LBL.forEach((dl,i)=>grid.append(h("div",{class:"cal-hdr",style:{color:i>=5?"#f59e0b":C().muted}},dl)));
  for(let i=0;i<firstDow;i++)grid.append(h("div",{class:"cal-empty"}));
  for(let d=1;d<=dim;d++){
    const dow=dowOf(d),isWk=dow>=5,isWork=d<=wd;
    const ex=getE(d),has=!!ex,isE=ex?._est;
    const ind=has?cind(ex):0,t=gt(ind);
    const btn=h("div",{
      class:"cal-day",
      style:{background:has?(isE?"#eef2ff":t.color+"12"):isWk?C().wknd:C().card,borderColor:has?(isE?"#818cf855":t.color+"60"):isWk?C().wkndBorder:C().border,cursor:isWork&&!isWk?"pointer":"default",opacity:isWork?1:.4},
      ...(isWork&&!isWk?{onClick:()=>openEd(d)}:{})
    },h("div",{style:{fontSize:"16px",fontWeight:800,color:C().text}},String(d)));
    if(has)btn.append(h("div",{style:{fontSize:"10px",fontWeight:800,color:isE?"#6366f1":t.color}},ind.toFixed(0)+"%"));
    grid.append(btn);
  }
  mc.append(grid);bg.append(mc);return bg;
}

function renderEditor(entries){
  const[yr,mo]=state.curMonth.split('-').map(Number);
  const bg=h("div",{class:"modal-bg",onClick:()=>ss({editDay:null})});
  const mc=h("div",{class:"modal-c",style:{background:C().card},onClick:e=>e.stopPropagation()});
  mc.append(h("div",{class:"modal-h"}));
  mc.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},
    h("div",null,
      h("div",{style:{fontSize:"20px",fontWeight:800,color:C().text}},"Día "+state.editDay+" · "+DOW_LBL[dowOf(state.editDay)]),
      h("div",{style:{fontSize:"12px",color:C().muted}},`${MN[mo-1]} ${yr} · Producción equipo`)
    ),
    h("button",{style:{background:C().toggle,border:"none",borderRadius:"50%",width:"38px",height:"38px",fontSize:"18px",cursor:"pointer",fontWeight:700,color:C().text},onClick:()=>ss({editDay:null})},"✕")
  ));
  mc.append(h("div",{class:"ct",style:{marginBottom:"8px",color:C().muted}},"Personas trabajando"));
  const ct=h("div",{class:"tog",style:{background:C().toggle}});
  [{v:2,l:"2 Personas"},{v:1,l:"1 Persona"}].forEach(t=>{
    const active=state.formCrew===t.v;
    ct.append(h("button",{style:{background:active?(t.v===2?"#16a34a":"#f59e0b"):"transparent",color:active?"#fff":C().dim},onClick:()=>ss({formCrew:t.v})},t.l));
  });
  mc.append(ct);
  const et=h("div",{class:"tog",style:{background:C().toggle}});
  [{v:false,l:"✅ Real"},{v:true,l:"🔮 Estimación"}].forEach(t=>{
    const active=state.formEst===t.v;
    et.append(h("button",{style:{background:active?(!t.v?"#16a34a":"#6366f1"):"transparent",color:active?"#fff":C().dim,fontSize:"13px"},onClick:()=>ss({formEst:t.v})},t.l));
  });
  mc.append(et);
  const grid=h("div",{class:"grid2"});
  IND.forEach(i=>{
    const val=state.form[i.key],pct=((val/state.formCrew)/getD(i.key))*100,t=gt(pct);
    const d=h("div",null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
        h("span",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"11px",fontWeight:700,color:C().dim}},ico(i.key),h("span",null,i.label)),
        h("span",{id:"pct-lbl-"+i.key,style:{fontSize:"10px",fontWeight:700,color:val>0?t.color:C().border}},pct.toFixed(0)+"%")
      )
    );
    const inp=h("input",{id:"inp-"+i.key,class:"inp",type:"number",inputMode:"decimal",min:"0",step:"0.5",placeholder:"0",value:val||"",style:{borderColor:val>0?t.color+"88":C().inpBorder,color:C().text}});
    inp.addEventListener("input",e=>updF(i.key,e.target.value));
    inp.addEventListener("focus",e=>e.target.select());
    d.append(inp);grid.append(d);
  });
  mc.append(grid);
  const fwc={...state.form,_crew:state.formCrew};
  const others=entries.filter(e=>e.day!==state.editDay);
  const allI=[...others.map(e=>cind(e)),cind(fwc)];
  const prevA=allI.length>0?allI.reduce((a,b)=>a+b,0)/allI.length:0;
  const prev=h("div",{id:"editor-preview",style:{background:state.formEst?"#eef2ff":C().track,borderRadius:"14px",padding:"14px",marginBottom:"16px",border:`1px solid ${state.formEst?"#c7d2fe":C().border}`}});
  prev.append(threePct(ceq(fwc),cind(fwc),prevA));
  mc.append(prev);
  mc.append(h("button",{class:"btn"+(state.formEst?" btn-est":""),onClick:saveDay},state.formEst?"Registrar Estimación":"Registrar Día"));
  if(getE(state.editDay))mc.append(h("button",{class:"btn btn-del",style:{marginTop:"10px"},onClick:()=>delDay(state.editDay)},"Eliminar"));
  bg.append(mc);return bg;
}

  mc.append(h("div",{class:"modal-h"}));
  mc.append(h("div",{style:{fontSize:"20px",fontWeight:800,marginBottom:"4px",color:C().text}},"Baremo Oficial"));
  mc.append(h("div",{style:{fontSize:"12px",color:C().muted,marginBottom:"16px"}},"Objetivo diario por fusionador"));
  let html=`<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="border-bottom:2px solid ${C().border}"><th style="text-align:left;padding:8px 4px;font-weight:700;color:${C().text}">Indicador</th><th style="text-align:center;padding:8px 4px;font-weight:700;color:${C().text}">Obj/día</th><th style="text-align:center;padding:8px 4px;font-weight:700;color:${C().text}">Actual</th></tr></thead><tbody>`;
  IND.forEach(i=>{

    html+=`<tr style="border-bottom:1px solid ${C().rowBorder}"><td style="padding:10px 4px;color:${C().text}">${i.label}</td><td style="text-align:center;padding:10px 4px;font-weight:800;color:#16a34a">${def}</td><td style="text-align:center;padding:10px 4px;font-weight:800;color:${changed?"#6366f1":"#16a34a"}">${cur}${changed?" *":""}</td></tr>`;
  });
  html+=`</tbody></table>`;
  const td=h("div",{html,style:{color:C().text}});
  mc.append(td);
  if(IND.some(i=>getD(i.key)!==DEFAULT_TARGETS[i.key]))mc.append(h("div",{style:{fontSize:"11px",color:C().muted,marginTop:"12px"}},"* Valor personalizado. Ajusta en Configuración."));

}

    onClick:()=>{

// ════════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  document.body.style.background=C().bg;
  document.body.style.color=C().text;
  app.innerHTML="";

  const entries=getEntries(),acum=gAcum(entries),avgEq=gAvgEq(entries),tier=gt(acum),best=bestDay(entries);

  if(state.detailDay){app.append(renderDetail(entries))}
  else if(state.view==="dashboard")app.append(renderDash(entries,acum,avgEq,tier,best));
  else if(state.view==="registro")app.append(renderReg(entries,acum,avgEq));
  else if(state.view==="resumen")app.append(renderRes(entries,acum,avgEq,tier));
  else app.append(renderHist());

  if(state.toast)app.append(h("div",{class:"toast"},state.toast));
  if(state.picker)app.append(renderPicker());
  if(state.editDay!==null)app.append(renderEditor(entries));
  if(state.baremo)app.append(renderBaremo());
  if(state.settingsOpen)app.append(renderSettings());

  // FAB
  if(!state.detailDay&&state.view!=="historico"){
    app.append(h("button",{class:"fab",onClick:()=>ss({picker:true})},"+"));
  }

  // Nav
  const nav=h("div",{class:"nav",style:{background:C().nav,borderColor:C().border}});
  [{id:"dashboard",l:"Dashboard",e:"📊"},{id:"registro",l:"Registro",e:"📅"},{id:"resumen",l:"Resumen",e:"📋"},{id:"historico",l:"Histórico",e:"📈"}].forEach(t=>{
    nav.append(h("button",{class:state.view===t.id&&!state.detailDay?"on":"off",onClick:()=>ss({view:t.id,detailDay:null})},
      h("span",{style:{fontSize:"19px"}},t.e),
      h("span",null,t.l)
    ));
  });
  app.append(nav);
}

// ════════════════════════════════════════════════════════════
// FIREBASE INIT
// ════════════════════════════════════════════════════════════
function fbInit(){
  try{
    firebase.initializeApp(FB_CFG);
    const db=firebase.database();
    fbRef=db.ref('produccion');
    db.ref('.info/connected').on('value',s=>{fbOk=s.val()===true;render()});
    fbRef.on('value',s=>{const v=s.val();if(v){state.data=v;svLocal(v);render()}});
  }catch(e){console.error("Firebase error:",e)}
}
function fbSave(d){if(fbRef)fbRef.set(d).catch(e=>console.error(e))}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
fbInit();
render();
</script>
