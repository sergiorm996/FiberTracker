<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#f8fdf9;color:#111827;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-top:env(safe-area-inset-top)}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.hdr{background:linear-gradient(135deg,#16a34a 0%,#0f7634 100%);color:#fff;padding:20px 20px 28px;border-radius:0 0 28px 28px}
.card{background:#fff;border-radius:18px;padding:20px;margin:0 16px 12px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid #e5e7eb}
.ct{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.btn{background:linear-gradient(135deg,#16a34a,#0f7634);color:#fff;border:none;border-radius:14px;padding:18px 24px;font-weight:700;font-size:17px;cursor:pointer;width:100%;font-family:inherit;display:block;text-align:center}
.btn-est{background:linear-gradient(135deg,#6366f1,#4f46e5)!important}
.btn-del{background:#fff!important;color:#ef4444;border:2px solid #fca5a5;font-size:15px;padding:15px 24px}
.inp{width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:11px 12px;font-size:17px;font-family:inherit;font-weight:700;text-align:center;outline:none;box-sizing:border-box}
.inp:focus{border-color:#16a34a}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-c{background:#fff;border-radius:28px 28px 0 0;padding:24px 20px 60px;width:100%;max-width:480px;max-height:90vh;max-height:90dvh;overflow-y:auto}
.modal-h{width:40px;height:4px;border-radius:2px;background:#d1d5db;margin:0 auto 16px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.2);white-space:nowrap}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:8px 0 14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));z-index:100}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;font-size:10px;cursor:pointer;padding:4px 12px;font-family:inherit}
.nav button.on{color:#16a34a;font-weight:700}
.nav button.off{color:#9ca3af;font-weight:500}
.fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#0f7634);color:#fff;border:none;font-size:30px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.4);z-index:150;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;font-weight:800;border-radius:50px;font-size:11px;padding:2px 7px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.three>div{border-radius:12px;padding:7px 4px;text-align:center}
.three .lbl{font-size:8px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.three .val{font-size:15px;font-weight:800}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.grid5 button{border-radius:14px;padding:10px 4px;cursor:pointer;text-align:center;font-family:inherit;border-width:2px;border-style:solid}
.bar-bg{height:5px;border-radius:3px;background:#ecfdf5;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tog{display:flex;background:#f3f4f6;border-radius:12px;padding:3px;margin-bottom:16px}
.tog button{flex:1;padding:10px 0;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-on{background:#16a34a;box-shadow:0 0 4px #16a34a}
.sync-off{background:#ef4444}
</style>

function getEntries(){const m=state.data[state.curMonth]||{};return Object.entries(m).map(([d,v])=>({day:Number(d),...v})).sort((a,b)=>a.day-b.day)}
function acumAt(entries,dn){const up=entries.filter(e=>e.day<=dn);if(!up.length)return 0;let s=0;up.forEach(e=>{s+=cind(e)});return s/up.length}

const h=(tag,attrs,...ch)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k==="html")el.innerHTML=v;else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v)});ch.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});return el};

function monthNav(){const[yr,mo]=state.curMonth.split("-").map(Number);const ml=`${MN[mo-1]} ${yr}`;return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"8px"}},h("button",{style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"20px",padding:"6px 14px",cursor:"pointer"},onClick:()=>shiftM(-1)},"‹"),h("div",{style:{fontSize:"22px",fontWeight:800}},ml),h("button",{style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"20px",padding:"6px 14px",cursor:"pointer"},onClick:()=>shiftM(1)},"›"))}

// VIEWS
// ════════════════════════════════════════════════════════════
function renderDash(entries,acum,avgEq,tier,best){
const f=document.createDocumentFragment();
f.append(h("div",{class:"hdr"},h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},h("div",null,h("div",{style:{fontSize:"26px",fontWeight:800,letterSpacing:"-0.5px",lineHeight:1.1}},"FiberTracker"),h("div",{style:{fontSize:"11px",fontWeight:600,opacity:.75,letterSpacing:"1px",textTransform:"uppercase",marginTop:"2px"}},"Producción Fusionadores")),syncDot()),monthNav()));
const w=h("div",{style:{marginTop:"-16px"}});
const rc=h("div",{class:"card"});rc.innerHTML=ringSVG(acum);
const stats=h("div",{style:{display:"flex",justifyContent:"space-around",marginTop:"16px",paddingTop:"14px",borderTop:"1px solid #f3f4f6"}},h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:"24px",fontWeight:800}},String(entries.length)),h("div",{style:{fontSize:"10px",color:"#9ca3af",fontWeight:600,textTransform:"uppercase"}},"Días")),h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:"24px",fontWeight:800,color:tier.color}},tier.bonus),h("div",{style:{fontSize:"10px",color:"#9ca3af",fontWeight:600,textTransform:"uppercase"}},"Bonus est.")));
